events {
    worker_connections 1024;
}

http {
    # Define an upstream group for all available router instances
    upstream routers {
        server router:3000;
    }

    server {
        listen 80;

        # The primary inference endpoint
        location /v1/chat/completions {
            # Buffer the request body so Lua can read it (if needed)
            lua_need_request_body on;

            set $target_backend "";

            access_by_lua_block {
                local cjson = require "cjson"
                local redis = require "resty.redis"
                
                -- Check for explicit node targeting (Sink Client / Verification Engine)
                local target_node = ngx.req.get_headers()["x-target-node"]

                if target_node then
                    -- Query Redis directly to find which IP holds the WebSocket
                    local red = redis:new()
                    red:set_timeouts(1000, 1000, 1000)
                    local ok, err = red:connect("redis", 6379)
                    
                    if ok then
                        local router_ip, err = red:hget("p2p:nodes:routing", target_node)
                        if router_ip and router_ip ~= ngx.null then
                            ngx.var.target_backend = router_ip .. ":3000"
                            -- We use x-allocated-node to tell the target router to skip the queue
                            ngx.req.set_header("X-Allocated-Node", target_node)
                            return -- Success, proceed to proxy_pass
                        end
                    end
                end

                -- Standard flow: Parse the model requested
                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                local model = "llama-3-8b" -- default
                
                if body then
                    local status, decoded = pcall(cjson.decode, body)
                    if status and decoded and decoded.model then
                        model = decoded.model
                    end
                end

                -- Make a rapid subrequest to the Node.js cluster to allocate an idle node
                local res = ngx.location.capture("/internal/allocate", {
                    args = { model = model }
                })

                if res.status == 200 then
                    local status, data = pcall(cjson.decode, res.body)
                    if status and data and data.routerIp and data.nodeId then
                        ngx.var.target_backend = data.routerIp .. ":3000"
                        ngx.req.set_header("X-Allocated-Node", data.nodeId)
                        return -- Success, proceed to proxy_pass
                    end
                end

                -- If allocation failed (e.g. no nodes, queue full, or 503)
                ngx.status = res.status
                ngx.say(res.body)
                ngx.exit(res.status)
            }

            # Proxy heavy streaming traffic directly to the chosen container IP
            proxy_pass http://$target_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Disable buffering to allow real-time SSE streaming
            proxy_buffering off;
            proxy_cache off;
        }

        # Internal endpoint for Lua subrequests (routes to any available Node.js router)
        location /internal/allocate {
            internal;
            proxy_pass http://routers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Everything else (Dashboards, WebSocket connections, other endpoints)
        location / {
            proxy_pass http://routers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
