version: "3.8"

services:
  router:
    build: ./central-router
    deploy:
      replicas: 3
    volumes:
      - router-data:/app/data
    environment:
      - PORT=3000
      - ADMIN_SECRET=${ADMIN_SECRET:-change-this-in-production}
      - RATE_LIMIT_RPM=60
      - QUEUE_MAX_SIZE=50
      - FIRST_TOKEN_TIMEOUT_MS=2000
      - TOTAL_TIMEOUT_MS=30000
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: openresty/openresty:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - router
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  router-data:
    driver: local
  redis-data:
    driver: local
